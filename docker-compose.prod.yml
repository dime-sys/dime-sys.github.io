# ─────────────────────────────────────────────────────────────────────────────
# Production stack — use with:
#   docker-compose -f docker-compose.prod.yml --env-file .env up -d
# ─────────────────────────────────────────────────────────────────────────────
services:

  postgres:
    image: postgres:16-alpine
    container_name: app_postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-data_intake_management}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — set it in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-data_intake_management}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always
    # No ports exposed — Postgres is internal only in production

  backend:
    build: ./backend
    container_name: app_backend
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-data_intake_management}
      - CORS_ORIGINS=http://${DOMAIN:-localhost},https://${DOMAIN:-localhost}
    volumes:
      - ./output_delivery:/app/output_delivery
    # No ports exposed — backend is accessed only through nginx

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=/api
    container_name: app_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
    volumes:
      # Mount the prod nginx config (serves static files + proxies /api → backend)
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
