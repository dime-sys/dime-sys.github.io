# nginx/nginx.https.conf
# ─────────────────────────────────────────────────────────────────────────────
# Usar SOLO cuando tengas un dominio con certificado Let's Encrypt.
#
# Pasos previos:
#   1. Instalar certbot:  apt install certbot -y
#   2. Obtener certificado:
#      certbot certonly --standalone -d tudominio.com
#   3. Reemplazar nginx.conf con este archivo:
#      cp nginx/nginx.https.conf nginx/nginx.conf
#   4. Cambiar el puerto en docker-compose.prod.yml:
#      ports:
#        - "80:80"
#        - "443:443"
#   5. Actualizar: bash deploy.sh update
# ─────────────────────────────────────────────────────────────────────────────

# Redirigir HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/TUDOMINIO/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/TUDOMINIO/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;
        client_max_body_size 100M;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
