# Railway deployment template — processed by envsubst on nginx startup.
# Set BACKEND_INTERNAL_URL in the Railway frontend service:
#   Paid plan (private networking): http://backend.railway.internal:8000
#   Hobby plan (public URL):        https://<your-backend>.up.railway.app
#
# NOTE: nginx variables ($host, $uri, etc.) must use $$ here so that
#       envsubst does NOT replace them (only ${BACKEND_INTERNAL_URL} is substituted).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass         ${BACKEND_INTERNAL_URL}/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $$host;
        proxy_set_header   X-Real-IP         $$remote_addr;
        proxy_set_header   X-Forwarded-For   $$proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $$scheme;
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;
        client_max_body_size 100M;
    }

    location / {
        try_files $$uri $$uri/ /index.html;
    }
}
